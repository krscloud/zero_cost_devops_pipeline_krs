---
- name: Deploy Automated Web Stack to Production (Native K3s Host Cluster)
  hosts: localhost
  connection: local
  become: false

  tasks:
    - name: Pause to allow Docker Hub to index incoming image layers
      ansible.builtin.pause:
        seconds: 15

    - name: Apply Kubernetes Deployment and Service Manifests
      shell: "export KUBECONFIG=$HOME/.kube/config && kubectl apply -f k8s-app.yaml"
      register: k8s_apply_output

    - name: Show Kubernetes Deployment Output
      debug:
        var: k8s_apply_output.stdout_lines

    - name: Force a rolling restart to pull the fresh image instantly
      shell: "export KUBECONFIG=$HOME/.kube/config && kubectl rollout restart deployment/krs-web-app"
