---
- name: Deploy Automated Web Stack to Production (Native K3s Host Cluster)
  hosts: localhost
  connection: local
  become: false

  tasks:
    - name: Pull latest code changes from GitHub down to the local host VM
      git:
        repo: 'https://github.com/YOUR_GITHUB_USERNAME/zero_cost_devops_pipeline_krs.git' # <--- Change to your real Git URL
        dest: /home/devopskrs/zero_cost_devops_pipeline_krs
        version: main
        force: yes

    - name: Pause to allow Docker Hub to index incoming image layers
      ansible.builtin.pause:
        seconds: 15

    - name: Apply Kubernetes Deployment and Service Manifests
      shell: "export KUBECONFIG=$HOME/.kube/config && kubectl apply -f /home/devopskrs/zero_cost_devops_pipeline_krs/k8s-app.yaml"
      register: k8s_apply_output

    - name: Force a rolling restart to pull the fresh image instantly
      shell: "export KUBECONFIG=$HOME/.kube/config && kubectl rollout restart deployment/krs-web-app"
