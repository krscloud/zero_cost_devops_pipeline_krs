---
- name: Deploy Automated Web Stack Locally
  hosts: localhost
  connection: local
  become: true

  tasks:
    - name: Stop existing container if running
      docker_container:
        name: web-app
        state: absent

    - name: Pull fresh image from Docker Hub
      docker_image:
        name: oraclekrscloud/devops-app
        tag: latest
        source: pull
        force_source: true

    - name: Start new container on port 5000
      docker_container:
        name: web-app
        image: oraclekrscloud/devops-app:latest
        state: started
        restart_policy: always
        published_ports:
          - "127.0.0.1:5000:5000"
   
    - name: Install Nginx web server
      dnf:
        name: nginx
        state: present

    - name: Configure Nginx as a Reverse Proxy
      copy:
        dest: /etc/nginx/default.d/reverse-proxy.conf
        content: |
          location / {
              proxy_pass http://127.0.0.1:5000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          }

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: restarted
        enabled: true
